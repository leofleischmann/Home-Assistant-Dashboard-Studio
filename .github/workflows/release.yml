name: Release

# Builds dashboard.js and attaches it to the GitHub Release.
# Create a Release in GitHub (e.g. tag v0.1.2) to trigger this.
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Verify panel bundle
        shell: bash
        run: |
          test -f custom_components/react_dashboard_studio/dashboard.js
          if grep -q 'from "./' dist/dashboard.js; then
            echo "dashboard.js must not import other chunks."
            exit 1
          fi

      - name: Attach dashboard.js to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/dashboard.js
            custom_components/react_dashboard_studio/dashboard.js
