name: Validate

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    name: Build & HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Verify panel bundle exists in integration
        shell: bash
        run: |
          test -f custom_components/react_dashboard_studio/dashboard.js
          test -f dist/dashboard.js
          if grep -q 'from "./' dist/dashboard.js; then
            echo "dashboard.js must not import other chunks."
            exit 1
          fi

      - uses: hacs/action@main
        with:
          category: integration

  hassfest:
    name: Hassfest validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master
